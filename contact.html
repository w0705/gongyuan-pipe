<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联系我们 - 公元管道</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/contact.css">
</head>
<body>
<header class="header">
  <div class="container">
    <div class="logo">
      <img src="images/logo.jpg" style="max-width:200px; height:auto;" alt="公元管道" class="logo-img">
      <span class="tagline">专业水管·施工改造·值得信赖</span>
    </div>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="products.html">产品中心</a>
      <a href="cases.html">工程案例</a>
      <a href="about.html">关于我们</a>
      <a href="contact.html" class="active">联系我们</a>
    </nav>
  </div>
</header>

<section class="page-hero">
  <div class="container">
    <h2>联系我们</h2>
    <p>期待您的咨询，我们将竭诚为您服务</p>
  </div>
</section>

<section class="contact-section">
  <div class="container">
    <div class="contact-info">
      <h3>联系方式</h3>
      <div class="info-item">
        <span class="icon">📞</span>
        <span>电话：19933218809</span>
      </div>
      
      <div class="info-item">
        <span class="icon">📍</span>
        <span>地址：河北省邢台市广宗县金园小区 109 商铺</span>
      </div>
      <div class="info-item">
        <span class="icon">⏰</span>
        <span>工作时间：周一至周日 8:00-20:00</span>
      </div>
    </div>

    <div class="contact-form-wrap">
      <h3>在线咨询</h3>
      <div class="wechat-contact">
        <p>欢迎添加老板微信，直接沟通更高效～</p>
        <div class="wechat-id">
          <span class="label">微信号：</span>
          <span class="value" id="wechatId">j19933218809</span>
          <button class="copy-btn" onclick="copyWechat()">复制</button>
        </div>
        <p class="tip">添加时请备注"网站咨询"，我们会尽快回复您</p>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <p>© 2024 公元管道. 保留所有权利.</p>
    <p>电话：19933218809 | 地址：河北省邢台市广宗县金园小区 109 商铺</p>
  </div>
</footer>

<script src="js/main.js"></script>
<script>
function copyWechat() {
  const wechatId = document.getElementById('wechatId').innerText;
  navigator.clipboard.writeText(wechatId).then(() => {
    alert('微信号已复制！请在微信中搜索添加好友');
  }).catch(() => {
    // Fallback for older browsers
    const textArea = document.createElement('textarea');
    textArea.value = wechatId;
    document.body.appendChild(textArea);
    textArea.select();
    document.execCommand('copy');
    document.body.removeChild(textArea);
    alert('微信号已复制！请在微信中搜索添加好友');
  });
}
</script>
</body>
</html>
